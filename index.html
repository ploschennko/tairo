<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Вуличний Оракул Таро — карти, які не брешуть.">
    <meta name="theme-color" content="#0b0814">
    <title>Вуличний Оракул Таро</title>
    <style>
        :root {
            --bg-color: #0b0814;
            --card-bg: #151026;
            --accent-purple: #9d4edd;
            --accent-glow: #c77dff;
            --text-main: #e0aaff;
            --text-muted: #9e95be;
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.3);
            --error: #ff4d4d;
            --success: #00e676;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(157, 78, 221, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(123, 44, 191, 0.15) 0%, transparent 40%);
        }

        .container {
            max-width: 1100px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            flex-grow: 1;
        }

        header { margin-bottom: 40px; }

        h1 {
            color: var(--gold);
            font-size: 2.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .workspace {
            background: rgba(21, 16, 38, 0.7);
            border: 1px solid rgba(157, 78, 221, 0.25);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            margin-bottom: 50px;
            transition: all 0.3s ease;
        }

        .input-group { position: relative; margin-bottom: 25px; }

        label {
            display: block;
            text-align: left;
            color: var(--accent-glow);
            font-size: 0.95rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: rgba(11, 8, 20, 0.8);
            border: 1px solid var(--accent-purple);
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-size: 1.05rem;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }

        textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.25), inset 0 2px 8px rgba(0,0,0,0.5);
        }

        .actions { display: flex; justify-content: center; gap: 15px; }

        button {
            background: linear-gradient(135deg, var(--accent-purple), #7b2cbf);
            color: #fff;
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 20px rgba(157, 78, 221, 0.4);
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(157, 78, 221, 0.6);
            background: linear-gradient(135deg, #a450e6, #863cc7);
        }

        button:active:not(:disabled) { transform: translateY(1px); }

        button:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

        button.secondary {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            box-shadow: none;
        }

        button.secondary:hover {
            background: rgba(158, 149, 190, 0.1);
            color: #fff;
            border-color: #fff;
        }

        .shuffling {
            display: none;
            margin: 40px 0;
            font-size: 1.2rem;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .shuffling-dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80% { content: '...'; }
        }

        .spread-container { display: none; margin-top: 20px; }

        .user-query-display {
            font-style: italic;
            color: var(--gold);
            font-size: 1.2rem;
            margin-bottom: 40px;
            padding: 15px;
            border-left: 3px solid var(--gold);
            background: rgba(255, 215, 0, 0.05);
            display: inline-block;
            text-align: left;
            border-radius: 0 8px 8px 0;
            max-width: 100%;
            word-wrap: break-word;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            perspective: 1000px;
        }

        .tarot-card-wrapper { height: 480px; cursor: pointer; }

        .tarot-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .tarot-card-wrapper.flipped .tarot-card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            padding: 30px 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .card-back {
            background: linear-gradient(135deg, #100b26 0%, #1d153a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--accent-purple);
        }

        .card-back-pattern {
            width: 100%;
            height: 100%;
            border: 1px dashed rgba(157, 78, 221, 0.3);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .card-back-pattern::before {
            content: "✦";
            font-size: 3rem;
            color: var(--gold);
            opacity: 0.4;
            text-shadow: 0 0 10px var(--gold);
        }

        .card-front {
            background: var(--card-bg);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            border-color: rgba(157, 78, 221, 0.4);
            overflow-y: auto;
        }

        .position-badge {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .card-title {
            font-size: 1.45rem;
            color: var(--gold);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .status-badge {
            font-size: 0.8rem;
            font-weight: bold;
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 22px;
            letter-spacing: 0.5px;
        }

        .status-direct {
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        .status-reversed {
            background: rgba(255, 77, 77, 0.15);
            color: var(--error);
            border: 1px solid rgba(255, 77, 77, 0.3);
        }

        .interpretation-text {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #ebdfff;
            text-align: left;
            border-top: 1px solid rgba(157, 78, 221, 0.2);
            padding-top: 15px;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .workspace { padding: 20px; }
            .tarot-card-wrapper { height: 440px; }
            .actions { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Вуличний Оракул</h1>
        <p class="subtitle">Жодних казок і рожевих сопель. Задавай питання і отримуй жорстку правду, яку ти, можливо, не готовий почути.</p>
    </header>

    <div class="workspace" id="inputBlock">
        <div class="input-group">
            <label for="userQuestion">Що тебе гризе?</label>
            <textarea id="userQuestion" placeholder="Питай що хочеш, тільки не тупи..."></textarea>
        </div>
        <div class="actions">
            <button id="submitBtn">Кинути карти</button>
        </div>
    </div>

    <div class="shuffling" id="shufflingBlock">
        <span class="shuffling-dots">Мішаємо карти, збираємо факти</span>
    </div>

    <div class="spread-container" id="spreadBlock">
        <div id="queryDisplay" class="user-query-display"></div>
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="actions" style="margin-top: 50px;">
            <button class="secondary" id="resetBtn">Ще питання</button>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 Вуличний Оракул • Налаштовано для того, щоб казати як є
</footer>

<script>
    "use strict";

    // Повна колода на 22 Старших Аркани в стилі "стріт-оракул"
    const fullTarotDeck = [
        { name: "0. Дурень", upright: "Стрибай у невідоме. Тобі щастить дурням, тож усе вийде, якщо не тупитимеш і не боятимешся.", reversed: "Ти знову стрибнув на ті самі граблі. Майстер спорту з безглуздих рішень і хаосу." },
        { name: "I. Маг", upright: "У тебе в руках всі козирі. Менше скигли, бери ситуацію за горлянку і роби те, що задумав.", reversed: "Думаєш, ти найрозумніший маніпулятор? Збоку виглядаєш як дешевий фокусник. Досить дурити людей і себе." },
        { name: "II. Жриця", upright: "Закрий рота і послухай свою інтуїцію. Відповідь вже в тебе в голові, просто припини смикатись.", reversed: "Ти ігноруєш очевидні речі і лізеш напролом там, де треба просто почекати. Жереб кинуто не туди." },
        { name: "III. Імператриця", upright: "Час збирати врожай і кайфувати. Все цвіте і пахне, розслабся і отримуй задоволення від життя.", reversed: "Задушив усіх своїм контролем або просто здувся. Творчий запор на повну котушку і брак бабок." },
        { name: "IV. Імператор", upright: "Постав усе на свої місця. Жорстка дисципліна і правила — і ти бос у цій грі.", reversed: "Втратив авторитет і бісишся. Твоя спроба бути тираном викликає в оточення тільки сміх." },
        { name: "V. Ієрофант", upright: "Знайди когось розумнішого за себе і спитай поради. Іноді треба грати за суспільними правилами.", reversed: "Ти застряг у своєму середньовіччі. Твої вперті догми нікому не потрібні, ставай гнучкішим." },
        { name: "VI. Закохані", upright: "Роби вибір серцем, а не холодним розрахунком. Час визначатися, хто ти і з ким ти далі йдеш.", reversed: "Метушишся між двома варіантами і зараз впадеш дупою на підлогу. Визначайся вже нарешті." },
        { name: "VII. Колісниця", upright: "Газ у підлогу! Ти преш як танк, і ніхто тебе не зупинить. Заслужена перемога попереду.", reversed: "Злетів у кювет через власні емоції та поспіх. Навчися тримати кермо, гонщик, поки не розбився." },
        { name: "VIII. Сила", upright: "Береш себе в руки і ламаєш будь-які перепони без істерик. Спокій — твоя найсильніша зброя зараз.", reversed: "Психуєш і показуєш зуби там, де треба діяти м'якше. Твоя агресія — це лише показник твоєї слабкості." },
        { name: "IX. Відшельник", upright: "Відвали від усіх і побудь наодинці. Тобі треба серйозно подумати, поки не наробив дурниць.", reversed: "Засидівся в барлозі. Твоя гординя і параноя залишать тебе в повній і абсолютній самотності." },
        { name: "X. Колесо Фортуни", upright: "Джекпот! Життя повертається до тебе світлим боком без твоїх зусиль. Лови цей момент.", reversed: "Смуга невдач. Не смикайся і не намагайся нічого довести, просто перечекай, поки це лайно закінчиться." },
        { name: "XI. Справедливість", upright: "Що посіяв, те й жереш. Усе складається максимально чесно, без образ. Карма в дії.", reversed: "Ти намагаєшся відмазатись від відповідальності за свої косяки, але розплата тебе вже шукає." },
        { name: "XII. Повішений", upright: "Застряг? Подивись на все догори дриґом. Іноді треба чимось пожертвувати, щоб рушити далі.", reversed: "Вдаєш із себе великомученика. Всім начхати на твої жертви, припини скиглити і дій." },
        { name: "XIII. Смерть", upright: "Старому кінець. Відрізай те, що відмерло, і не смій плакати. Попереду нормальне чисте життя.", reversed: "Чіпляєшся за труп своїх ілюзій і минулого. Відпусти, бо згниєш разом із ним в одній ямі." },
        { name: "XIV. Помірність", upright: "Охолонь. Знайди золоту середину і перестань кидатись у крайнощі. Все налагодиться само собою.", reversed: "Тебе хитає від святого до грішника. Заспокой свої апетити (до грошей, людей чи алкоголю), бо луснеш." },
        { name: "XV. Диявол", upright: "Ти на гачку своїх залежностей і пороків. Токсичні люди або звички зараз керують тобою.", reversed: "Ого, ти нарешті зрозумів, що сидиш у багнюці, і почав з неї вилазити. Звільнення вже близько." },
        { name: "XVI. Вежа", upright: "Всьому хана. Твої повітряні замки зносить ураганом. Доведеться будувати все наново на нормальному фундаменті.", reversed: "Ти сидиш на пороховій діжці і вдаєш, що це крісло-гойдалка. Відтягуєш неминучий вибух." },
        { name: "XVII. Зірка", upright: "Попереду світло. Все налагодиться, ти рухаєшся в правильному напрямку, просто май терпіння.", reversed: "Розпустив шмарклі і зневірився за метр до фінішу. Зберися, все не так погано, як ти собі накрутив." },
        { name: "XVIII. Місяць", upright: "Навколо мутки і туман. Тобі брешуть, і ти сам собі брешеш. Не вір словам, вмикай чуйку.", reversed: "Рожеві окуляри розбилися скельцями всередину. Ти нарешті бачиш усю цю брехню і можеш діяти адекватно." },
        { name: "XIX. Сонце", upright: "Абсолютний кайф і перемога. Ти на вершині, і все складається ідеально. Радій життю.", reversed: "Успіх є, але ти так сильно ним хизуєшся, що аж бісиш усіх навколо. Скромніше обличчя зроби." },
        { name: "XX. Суд", upright: "Час розплати і пробудження. Твоє життя переходить на новий левел, залишай образи в минулому.", reversed: "Боїшся щось змінювати і живеш минулими помилками. Боягузтво ще нікому не допомагало розвиватися." },
        { name: "XXI. Світ", upright: "Бінго. Ти пройшов цю гру. Абсолютна гармонія, тріумф і досягнення того, чого хотів.", reversed: "Майже дійшов, але застряг на фінальному босі через свою лінь або дурний перфекціонізм. Дотискай." }
    ];

    const positions = ["Минуле (Що вплинуло)", "Теперішнє (Що є зараз)", "Майбутнє (До чого йде)"];

    document.addEventListener("DOMContentLoaded", function() {
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');

        if (submitBtn) {
            submitBtn.addEventListener('click', function() {
                const questionInput = document.getElementById('userQuestion');
                const inputBlock = document.getElementById('inputBlock');
                const shufflingBlock = document.getElementById('shufflingBlock');
                const spreadBlock = document.getElementById('spreadBlock');
                const queryDisplay = document.getElementById('queryDisplay');
                const cardsGrid = document.getElementById('cardsGrid');

                const questionText = questionInput.value.trim();

                submitBtn.disabled = true;
                inputBlock.style.display = 'none';
                shufflingBlock.style.display = 'block';
                spreadBlock.style.display = 'none';

                setTimeout(() => {
                    shufflingBlock.style.display = 'none';
                    spreadBlock.style.display = 'block';
                    submitBtn.disabled = false; 

                    if (questionText) {
                        queryDisplay.innerText = `Твоє питання: «${questionText}»`;
                        queryDisplay.style.display = 'inline-block';
                    } else {
                        queryDisplay.innerText = "Розклад для тих, кому ліньки писати питання.";
                        queryDisplay.style.display = 'inline-block';
                    }

                    let deckCopy = [...fullTarotDeck];
                    let selectedCards = [];
                    for (let i = 0; i < 3; i++) {
                        let randomIndex = Math.floor(Math.random() * deckCopy.length);
                        selectedCards.push(deckCopy.splice(randomIndex, 1)[0]);
                    }

                    cardsGrid.innerHTML = '';

                    selectedCards.forEach((card, index) => {
                        const isUpright = Math.random() > 0.4; 
                        const statusText = isUpright ? "Прямо" : "Перевернуто";
                        const statusClass = isUpright ? "status-direct" : "status-reversed";
                        const interpretation = isUpright ? card.upright : card.reversed;

                        const cardWrapper = document.createElement('div');
                        cardWrapper.className = 'tarot-card-wrapper';
                        
                        cardWrapper.innerHTML = `
                            <div class="tarot-card-inner">
                                <div class="card-back">
                                    <div class="card-back-pattern"></div>
                                </div>
                                <div class="card-front">
                                    <div class="position-badge">${positions[index]}</div>
                                    <div class="card-title">${card.name}</div>
                                    <div class="status-badge ${statusClass}">${statusText}</div>
                                    <div class="interpretation-text">${interpretation}</div>
                                </div>
                            </div>
                        `;

                        cardsGrid.appendChild(cardWrapper);

                        setTimeout(() => {
                            cardWrapper.classList.add('flipped');
                        }, (index + 1) * 350);
                    });

                }, 1500);
            });
        }

        if (resetBtn) {
            resetBtn.addEventListener('click', function() {
                document.getElementById('userQuestion').value = '';
                document.getElementById('inputBlock').style.display = 'block';
                document.getElementById('spreadBlock').style.display = 'none';
                document.getElementById('shufflingBlock').style.display = 'none';
            });
        }
    });
</script>

</body>
</html>
